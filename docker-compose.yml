services:
  db:
    image: postgres:16-alpine
    container_name: showjump_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: showjump
      POSTGRES_PASSWORD: showjump
      POSTGRES_DB: showjump
    ports:
      - "5440:5432"
    volumes:
      - showjump_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showjump -d showjump"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: showjump_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  showjump_pgdata:
