<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2e4cc"/>
      <stop offset="40%" stop-color="#deb887"/>
      <stop offset="100%" stop-color="#b8956a"/>
    </linearGradient>
    <filter id="grain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 .92 0 0 0 0 .88 0 0 0 0 .78 0 0 0 .1 0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#s)" filter="url(#grain)"/>
</svg>
